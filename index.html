<html lang="th">

        :root {
            /* ไล่สีปุ่ม: ล่างเข้มไปบนอ่อน */
            --gold-grad: linear-gradient(0deg, #8a5a12 0%, #b38728 50%, #fcf6ba 100%);
            --blue-deep: #001ba0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #000; font-family: 'Sarabun', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }

        .app-container {
            width: 100%; max-width: 500px; height: 100vh; margin: 0 auto;
            background: #fff; position: relative; overflow: hidden;
        }

        .page { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ปรับภาพให้ชัดและเต็มจอ */
        .bg-img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            position: absolute; top: 0; left: 0; z-index: -1; 
            pointer-events: none;
        }

        /* ตำแหน่งปุ่มกด */
        .btn-wrapper {
            position: absolute; bottom: 6%; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 999;
        }
        
        .btn-main {
            background: var(--gold-grad);
            color: #403010; border: 2px solid #aa771c;
            padding: 18px 0; width: 85%; border-radius: 50px;
            font-size: 20px; font-weight: 700; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.95); }
